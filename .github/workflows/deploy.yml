name: Deploy to Vercel (optional)

on:
  push:
    branches: [main]
  workflow_dispatch:

# This workflow is OPTIONAL.
# Vercel has direct GitHub integration (no secrets needed):
#   - Vercel auto-detects Next.js from package.json
#   - Vercel auto-deploys on every push to main
#   - Vercel dashboard: https://vercel.com/dashboard
#
# This workflow only runs if you set 3 GitHub Secrets:
#   - VERCEL_TOKEN (from vercel.com/account/tokens)
#   - VERCEL_ORG_ID
#   - VERCEL_PROJECT_ID
#
# To enable: Settings → Secrets and variables → Actions → New repository secret

jobs:
  deploy:
    if: ${{ env.VERCEL_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
